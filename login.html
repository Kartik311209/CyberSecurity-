<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CFIP – Secure Login</title>
  <meta name="description" content="Secure login portal for the Cyber Forensic Intelligence Platform."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #050b14;
      --surface:    #0a1628;
      --surface-2:  #0f1f35;
      --border:     rgba(99,179,237,.15);
      --primary:    #2563eb;
      --primary-lt: rgba(37,99,235,.12);
      --cyan:       #06b6d4;
      --red:        #ef4444;
      --green:      #22c55e;
      --text-1:     #f1f5f9;
      --text-2:     #94a3b8;
      --text-3:     #475569;
      --glow-blue:  rgba(37,99,235,.6);
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      overflow: hidden;
    }

    /* ── Background ────────────────────────────── */
    .bg-scene {
      position: fixed; inset: 0; z-index: 0;
      background:
        linear-gradient(rgba(6,182,212,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6,182,212,.04) 1px, transparent 1px);
      background-size: 44px 44px;
      animation: gridScroll 18s linear infinite;
    }
    @keyframes gridScroll {
      from { background-position: 0 0; }
      to   { background-position: 44px 44px; }
    }
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(90px); opacity: .18; pointer-events: none; z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: #2563eb; top: -150px; left: -150px; }
    .blob-2 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; right: -100px; }
    .scanlines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
    }
    #particle-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── Wrapper ───────────────────────────────── */
    .login-wrapper {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }

    /* ── Card ──────────────────────────────────── */
    .login-card {
      width: 100%; max-width: 450px;
      background: rgba(10,22,40,.88);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 40px 32px;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(6,182,212,.08),
        0 32px 80px rgba(0,0,0,.6),
        0 0 60px rgba(37,99,235,.1);
      animation: cardIn .55s cubic-bezier(.22,1,.36,1) both;
      transition: min-height .35s ease;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ─────────────────────────────────── */
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #1e40af, #0ea5e9);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px var(--glow-blue); flex-shrink: 0;
    }
    .brand-icon svg { color: #fff; }
    .brand-text { display: flex; flex-direction: column; }
    .brand-name {
      font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
      background: linear-gradient(90deg, #e2e8f0, #7dd3fc);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand-sub {
      font-size: 10px; font-weight: 600; color: var(--text-3);
      letter-spacing: 1.2px; text-transform: uppercase; margin-top: 1px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin-bottom: 24px;
    }

    /* ── Tab switcher ──────────────────────────── */
    .tab-switcher {
      display: flex; gap: 4px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1; padding: 9px 0;
      border: none; border-radius: 9px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .22s ease;
      background: transparent; color: var(--text-2);
    }
    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 12px rgba(37,99,235,.45);
    }
    .tab-btn:not(.active):hover { color: var(--text-1); background: rgba(255,255,255,.05); }

    /* ── Panel visibility ──────────────────────── */
    .form-panel { display: none; animation: fadePanel .25s ease; }
    .form-panel.active { display: block; }
    @keyframes fadePanel {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Alert ─────────────────────────────────── */
    .alert {
      display: none; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 10px;
      font-size: 13px; font-weight: 500; margin-bottom: 18px;
    }
    .alert.error   { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .alert.success { background: rgba(34,197,94,.1);  border: 1px solid rgba(34,197,94,.3);  color: #86efac; }
    .alert.show    { display: flex; animation: slideIn .25s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Form fields ───────────────────────────── */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-2); text-transform: uppercase;
      letter-spacing: .8px; margin-bottom: 7px;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); display: flex; pointer-events: none; transition: color .2s;
    }
    .form-input {
      width: 100%; padding: 12px 14px 12px 42px;
      background: var(--surface-2);
      border: 1px solid rgba(99,179,237,.15);
      border-radius: 10px;
      color: var(--text-1); font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none; transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-input::placeholder { color: var(--text-3); }
    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.2), 0 0 16px rgba(37,99,235,.12);
    }
    .form-input.error-field { border-color: var(--red); box-shadow: 0 0 0 3px rgba(239,68,68,.15); }
    .input-wrap:focus-within .input-icon { color: var(--cyan); }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-3); background: none; border: none; cursor: pointer;
      display: flex; padding: 2px; transition: color .2s;
    }
    .pw-toggle:hover { color: var(--text-1); }

    /* Inline hint under field */
    .field-hint { font-size: 11px; color: var(--text-3); margin-top: 5px; padding-left: 2px; }
    .field-hint.err { color: #fca5a5; }

    /* Password strength bar */
    .strength-wrap { margin-top: 7px; display: flex; flex-direction: column; gap: 4px; }
    .strength-track { height: 4px; border-radius: 20px; background: var(--surface-2); overflow: hidden; }
    .strength-bar   { height: 100%; border-radius: 20px; transition: width .3s ease, background .3s ease; width: 0; }
    .strength-label { font-size: 11px; color: var(--text-3); }

    /* ── Form options row ──────────────────────── */
    .form-options {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
    }
    .checkbox-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-2); cursor: pointer; user-select: none;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer;
    }
    .forgot-link {
      font-size: 13px; color: var(--cyan); text-decoration: none;
      font-weight: 500; transition: color .2s;
    }
    .forgot-link:hover { color: #7dd3fc; }

    /* ── Submit button ─────────────────────────── */
    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px; font-weight: 700;
      letter-spacing: .3px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(37,99,235,.4);
      position: relative; overflow: hidden;
    }
    .btn-login::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.12), transparent);
      pointer-events: none;
    }
    .btn-login:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(37,99,235,.55); }
    .btn-login:active  { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .btn-spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status & footer ───────────────────────── */
    .status-strip {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 18px; font-size: 11px; color: var(--text-3);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 6px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    .login-footer {
      margin-top: 14px; text-align: center;
      font-size: 11px; color: var(--text-3);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Top badges ────────────────────────────── */
    .top-badges { position: fixed; top: 20px; right: 20px; z-index: 20; display: flex; gap: 8px; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; }
    .badge-red  { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .badge-cyan { background: rgba(6,182,212,.12);  border: 1px solid rgba(6,182,212,.3);  color: #67e8f9; }

    /* Shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
  </style>
</head>
<body>

<div class="bg-scene"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="scanlines"></div>
<canvas id="particle-canvas"></canvas>

<div class="top-badges">
  <span class="badge badge-red">● CLASSIFIED</span>
  <span class="badge badge-cyan">SOC PORTAL</span>
</div>

<div class="login-wrapper">
  <div class="login-card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">CFIP</span>
        <span class="brand-sub">Cyber Forensic Intelligence Platform</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Tab switcher -->
    <div class="tab-switcher" role="tablist">
      <button class="tab-btn active" id="tab-login" role="tab" onclick="switchTab('login')">
        🔐 Sign In
      </button>
      <button class="tab-btn" id="tab-signup" role="tab" onclick="switchTab('signup')">
        ✨ Sign Up
      </button>
    </div>

    <!-- Shared alert box -->
    <div class="alert error" id="alert-box" role="alert">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alert-msg">Invalid credentials.</span>
    </div>

    <!-- ══ LOGIN PANEL ══ -->
    <div class="form-panel active" id="panel-login">
      <form id="login-form" onsubmit="handleLogin(event)" novalidate>

        <div class="form-group">
          <label class="form-label" for="login-username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="login-username" class="form-input" placeholder="Enter your username" autocomplete="username" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="login-password" class="form-input" placeholder="••••••••••" autocomplete="current-password" required/>
            <button type="button" class="pw-toggle" onclick="togglePw('login-password','eye-login')" aria-label="Toggle password">
              <svg id="eye-login" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me"/>
            Remember me
          </label>
          <a href="#" class="forgot-link" onclick="showForgot();return false;">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          <span class="btn-spinner" id="login-spinner"></span>
          <span id="login-label">Sign In</span>
          <svg id="login-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

      </form>
    </div>

    <!-- ══ SIGNUP PANEL ══ -->
    <div class="form-panel" id="panel-signup">
      <form id="signup-form" onsubmit="handleSignup(event)" novalidate>

        <div class="form-group">
          <label class="form-label" for="su-name">Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="su-name" class="form-input" placeholder="e.g. Kartik Sharma" autocomplete="name" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="su-username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            </span>
            <input type="text" id="su-username" class="form-input" placeholder="unique_username" autocomplete="username" required/>
          </div>
          <p class="field-hint">Letters, numbers, underscores only. Min 3 chars.</p>
        </div>

        <div class="form-group">
          <label class="form-label" for="su-email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="su-email" class="form-input" placeholder="analyst@cfip.sec" autocomplete="email" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="su-password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="su-password" class="form-input" placeholder="Min 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)" required/>
            <button type="button" class="pw-toggle" onclick="togglePw('su-password','eye-su')" aria-label="Toggle password">
              <svg id="eye-su" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-wrap">
            <div class="strength-track"><div class="strength-bar" id="strength-bar"></div></div>
            <span class="strength-label" id="strength-label">Enter a password</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="su-confirm">Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </span>
            <input type="password" id="su-confirm" class="form-input" placeholder="Re-enter password" autocomplete="new-password" required/>
          </div>
        </div>

        <button type="submit" class="btn-login" id="signup-btn" style="background:linear-gradient(135deg,#065f46,#059669);box-shadow:0 4px 20px rgba(5,150,105,.4)">
          <span class="btn-spinner" id="signup-spinner"></span>
          <span id="signup-label">Create Account</span>
          <svg id="signup-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

      </form>
    </div>

    <!-- Status -->
    <div class="status-strip">
      <span class="status-dot"></span>
      <span>CFIP backend active &nbsp;·&nbsp; TLS 1.3 &nbsp;·&nbsp; Access is logged</span>
    </div>
    <div class="login-footer">CFIP v1.0 &nbsp;|&nbsp; © 2025 CFIP Security Labs</div>

  </div>
</div>

<script>
  /* ══ Demo credentials ═══════════════════════════════════
     Login:  admin / admin123  |  kartik / cfip2025
     Signup: saved in-memory (session only – server restart clears them)
  ═══════════════════════════════════════════════════════ */
  const DEMO_USERS = {
    'admin':   { password: 'admin123', name: 'Admin',  role: 'SOC Admin'   },
    'kartik':  { password: 'cfip2025', name: 'Kartik', role: 'SOC Analyst' },
    'analyst': { password: 'cfip2025', name: 'Analyst',role: 'SOC Analyst' },
  };

  // ── Tab switch ──────────────────────────────────────
  function switchTab(tab) {
    hideAlert();
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
  }

  // ── Alert ───────────────────────────────────────────
  function showAlert(msg, type = 'error') {
    const box = document.getElementById('alert-box');
    document.getElementById('alert-msg').textContent = msg;
    box.className = `alert ${type} show`;
  }
  function hideAlert() {
    document.getElementById('alert-box').classList.remove('show');
  }

  // ── Password toggle ─────────────────────────────────
  function togglePw(inputId, iconId) {
    const inp = document.getElementById(inputId);
    const ico = document.getElementById(iconId);
    if (inp.type === 'password') {
      inp.type = 'text';
      ico.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      ico.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  // ── Password strength ───────────────────────────────
  function checkStrength(val) {
    const bar   = document.getElementById('strength-bar');
    const label = document.getElementById('strength-label');
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { w: '0%',   color: 'transparent', text: 'Enter a password' },
      { w: '25%',  color: '#ef4444',     text: 'Weak' },
      { w: '50%',  color: '#f97316',     text: 'Fair' },
      { w: '75%',  color: '#eab308',     text: 'Good' },
      { w: '90%',  color: '#22c55e',     text: 'Strong' },
      { w: '100%', color: '#06b6d4',     text: '💪 Very Strong' },
    ];
    const lvl = levels[Math.min(score, 5)];
    bar.style.width      = lvl.w;
    bar.style.background = lvl.color;
    label.textContent    = lvl.text;
    label.style.color    = score >= 3 ? lvl.color : 'var(--text-3)';
  }

  // ── Button loading ──────────────────────────────────
  function setLoading(prefix, on) {
    const btn     = document.getElementById(prefix + '-btn');
    const spinner = document.getElementById(prefix + '-spinner');
    const label   = document.getElementById(prefix + '-label');
    const arrow   = document.getElementById(prefix + '-arrow');
    const texts   = { login: ['Sign In','Signing In…'], signup: ['Create Account','Creating…'] };
    btn.disabled          = on;
    spinner.style.display = on ? 'block' : 'none';
    label.textContent     = on ? texts[prefix][1] : texts[prefix][0];
    if (arrow) arrow.style.display = on ? 'none' : 'block';
  }

  // ── LOGIN ───────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    hideAlert();
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username || !password) { showAlert('Please fill in all fields.'); return; }
    setLoading('login', true);

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (data.success) { loginSuccess(data.name || username); return; }
      setLoading('login', false);
      showAlert(data.error || 'Invalid credentials.');
      shakeCard(); return;
    } catch (_) { /* server offline – demo fallback */ }

    await sleep(800);
    const u = DEMO_USERS[username.toLowerCase()];
    if (u && u.password === password) {
      loginSuccess(u.name);
    } else {
      setLoading('login', false);
      showAlert('Invalid credentials. Hint: admin / admin123');
      shakeCard();
    }
  }

  // ── SIGNUP ──────────────────────────────────────────
  async function handleSignup(e) {
    e.preventDefault();
    hideAlert();

    const name     = document.getElementById('su-name').value.trim();
    const username = document.getElementById('su-username').value.trim();
    const email    = document.getElementById('su-email').value.trim();
    const password = document.getElementById('su-password').value;
    const confirm  = document.getElementById('su-confirm').value;

    // Validation
    if (!name || !username || !email || !password || !confirm) {
      showAlert('Please fill in all fields.'); return;
    }
    if (!/^[a-zA-Z0-9_]{3,}$/.test(username)) {
      showAlert('Username must be 3+ characters: letters, numbers, underscores only.'); return;
    }
    if (!/\S+@\S+\.\S+/.test(email)) {
      showAlert('Please enter a valid email address.'); return;
    }
    if (password.length < 6) {
      showAlert('Password must be at least 6 characters.'); return;
    }
    if (password !== confirm) {
      showAlert('Passwords do not match.'); return;
    }
    if (DEMO_USERS[username.toLowerCase()]) {
      showAlert('Username already taken. Please choose another.'); return;
    }

    setLoading('signup', true);

    try {
      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, username, email, password }),
      });
      const data = await res.json();
      if (data.success) {
        showAlert(`Account created! Welcome, ${name}. Redirecting…`, 'success');
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        return;
      }
      setLoading('signup', false);
      showAlert(data.error || 'Sign up failed. Try a different username.');
      return;
    } catch (_) { /* server offline */ }

    // Demo fallback – register locally
    await sleep(800);
    DEMO_USERS[username.toLowerCase()] = { password, name, role: 'SOC Analyst' };
    showAlert(`Account created! Welcome, ${name}. Redirecting…`, 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
  }

  // ── Helpers ─────────────────────────────────────────
  function loginSuccess(name) {
    showAlert(`Access granted, ${name}. Redirecting to dashboard…`, 'success');
    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
  }
  function shakeCard() {
    const card = document.querySelector('.login-card');
    card.style.animation = 'none'; card.offsetWidth;
    card.style.animation = 'shake .4s ease';
  }
  function showForgot() {
    showAlert('Contact your SOC administrator to reset your credentials.');
  }
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  // ── Particle canvas ─────────────────────────────────
  (function() {
    const canvas = document.getElementById('particle-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [];
    function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
    window.addEventListener('resize', resize); resize();
    function rand(a, b) { return a + Math.random() * (b - a); }
    function Particle() {
      this.x = rand(0,W); this.y = rand(0,H);
      this.vx = rand(-.3,.3); this.vy = rand(-.5,-.15);
      this.alpha = rand(.2,.7); this.size = rand(1,2.5);
      this.color = Math.random() > .5 ? '#2563eb' : '#06b6d4';
    }
    for (let i = 0; i < 60; i++) particles.push(new Particle());
    function draw() {
      ctx.clearRect(0,0,W,H);
      particles.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.alpha;
        ctx.fillStyle = ctx.shadowColor = p.color; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
        p.x += p.vx; p.y += p.vy;
        if (p.y < -10) { p.y = H+10; p.x = rand(0,W); }
        if (p.x < 0 || p.x > W) p.vx *= -1;
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
